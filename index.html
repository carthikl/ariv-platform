<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ARIV — Applied Resilience, Intelligence & Velocity. Enterprise Transformation Platform. Karthik Loganathan." />
    <meta property="og:title" content="ARIV — Enterprise Transformation Platform" />
    <meta property="og:description" content="Quality@Speed operating model. 30 years of enterprise leadership across financial services, retail, and wealth management." />
    <title>ARIV — Enterprise Transformation Platform</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #080808; }
      #root { min-height: 100vh; }
    </style>
    <!-- mobile-fix -->
<style>
@media (max-width: 639px) {
  /* Collapse all sidebar + detail panel grids */
  div[style*="248px 1fr"], div[style*="260px 1fr"],
  div[style*="280px 1fr"], div[style*="320px 1fr"],
  div[style*="160px 1fr"], div[style*="190px 1fr"],
  div[style*="180px 1fr"] {
    display: flex !important;
    flex-direction: column !important;
  }
  /* Collapse 4-col grids */
  div[style*="1fr 1fr 1fr 1fr"] {
    grid-template-columns: 1fr 1fr !important;
  }
  /* Collapse 3-col grids */  
  div[style*="1fr 1fr 1fr"] {
    grid-template-columns: 1fr 1fr !important;
  }
  /* Collapse outcome tables */
  div[style*="2fr 1fr 1fr 1fr"] {
    grid-template-columns: 1fr 1fr !important;
  }
  /* Reduce padding */
  div[style*="padding: 28px"], div[style*="padding: 32px"],
  div[style*="padding: 24px 28px"], div[style*="padding: 20px 28px"],
  div[style*="padding: 22px 28px"] {
    padding-left: 14px !important;
    padding-right: 14px !important;
  }
  /* Prevent horizontal overflow */
  body { overflow-x: hidden; }
  #root > div { overflow-x: hidden; max-width: 100vw; }
  /* Sidebar items take full width */
  div[style*="min-height: 580"], div[style*="min-height: 600"],
  div[style*="min-height: 620"], div[style*="min-height: 520"] {
    min-height: auto !important;
  }
}
@media (max-width: 479px) {
  div[style*="1fr 1fr 1fr 1fr"] {
    grid-template-columns: 1fr !important;
  }
}
</style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
